name: Publish to npm

# releases are cut from main, which requires lint + tests to pass via branch
# protection, so the released commit is already validated - no need to re-check here

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      # prepublishOnly builds dist/ via `npm run package`; OIDC attaches provenance
      - name: Publish to npm
        run: npm publish --provenance
