default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: vp-fmt
        name: Format (oxfmt)
        entry: vp fmt --write
        types_or: [file]
        language: system
        pass_filenames: false
      - id: vp-lint
        name: Lint (oxlint)
        entry: vp lint --fix
        types_or: [file]
        language: system
        pass_filenames: false
      - id: svelte-check
        name: Svelte type check
        entry: bash -c 'npx svelte-kit sync && npx svelte-check --threshold error || true'
        language: system
        types_or: [ts, svelte]
        pass_filenames: false
      - id: no-test-only
        name: Don't commit test selection modifiers
        entry: '(test|describe).only\('
        language: pygrep
        types: [ts]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        stages: [pre-commit, commit-msg]
        args: [--ignore-words-list, falsy, --check-filenames]
        exclude: changelog\.md
