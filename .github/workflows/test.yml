name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install

      - name: Unit tests
        run: npx vp test --run

      - name: Package smoke test
        run: npm run test:package

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E tests
        run: npx playwright test
